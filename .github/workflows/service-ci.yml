name: Service CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  service-tests:
    name: Compile and test service slices
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run service and verification tests
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-suite.ps1

      - name: Run mobile UI tests
        shell: bash
        run: |
          set -euo pipefail
          node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --test apps/mobile/test/*.test.ts

      - name: Check whitespace
        shell: bash
        run: git diff --check
