name: Service CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  service-tests:
    name: Compile and test service slices
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --no-fund --no-audit

      - name: Run Maven service, contract, and acceptance tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Install voice-service test dependencies
        working-directory: services/voice-service
        run: python -m pip install -e ".[test]"

      - name: Test and build voice-service
        working-directory: services/voice-service
        run: |
          python -m pytest
          python -m build

      - name: Type-check and test mobile app
        working-directory: apps/mobile
        run: npm run validate

      - name: Check whitespace
        shell: bash
        run: git diff --check
