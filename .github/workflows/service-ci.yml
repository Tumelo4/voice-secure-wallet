name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"

jobs:
  java-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress test -DskipTests=false

  architecture-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl quality/architecture-tests -am test

  financial-mutation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl services/ledger-service -am install -DskipTests
      - run: mvn --batch-mode --no-transfer-progress -pl services/ledger-service test-compile org.pitest:pitest-maven:mutationCoverage -DtargetClasses=com.voicesecure.ledger.LedgerService -DtargetTests=com.voicesecure.ledger.LedgerMutationTest
      - run: mvn --batch-mode --no-transfer-progress -pl services/payment-service -am install -DskipTests
      - run: mvn --batch-mode --no-transfer-progress -pl services/payment-service test-compile org.pitest:pitest-maven:mutationCoverage -DtargetClasses=com.voicesecure.payments.Money -DtargetTests=com.voicesecure.payments.MoneyMutationTest
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: financial-mutation-reports
          path: services/*/target/pit-reports/

  messaging-integration:
    runs-on: ubuntu-latest
    services:
      redpanda:
        image: docker.redpanda.com/redpandadata/redpanda@sha256:7214ddaf8426d25936459cf77c1f905566a4483a97d2b13006120dcd98a5c846
        ports: ["9092:9092"]
        options: >-
          --health-cmd "rpk cluster health --exit-when-healthy"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker exec ${{ job.services.redpanda.id }} rpk topic create payment-events --partitions 3 --replicas 1
      - run: docker exec ${{ job.services.redpanda.id }} rpk topic produce payment-events --key payment-1 -f '%k:%v\n' <<< '{"eventId":"event-1","type":"payment.started"}'
      - run: docker exec ${{ job.services.redpanda.id }} rpk topic consume payment-events --num 1 --format '%k:%v\n' | grep 'payment-1:.*event-1'
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl tests/contract-tests -am test

  performance-resilience-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl services/payment-service -am test-compile
      - run: java -cp services/payment-service/target/classes:services/payment-service/target/test-classes com.voicesecure.payments.PaymentLoadProbe services/payment-service/target/performance/payment-load.json
      - run: mvn --batch-mode --no-transfer-progress -pl services/payment-service,services/ledger-service -am test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: performance-resilience-evidence
          path: |
            services/payment-service/target/performance/
            services/payment-service/target/surefire-reports/
            services/ledger-service/target/surefire-reports/

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl tests/contract-tests -am verify

  openapi-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24" }
      - run: npx --yes @redocly/cli@2.11.0 lint docs/api/openapi.yaml

  acceptance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -pl tests/acceptance-tests -am verify

  voice-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.11", cache: pip }
      - working-directory: services/voice-service
        run: python -m pip install -e ".[test]"
      - working-directory: services/voice-service
        run: python -m pytest --junitxml=voice-test-results.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: voice-test-results, path: services/voice-service/voice-test-results.xml }

  mobile-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24", cache: npm, cache-dependency-path: apps/mobile/package-lock.json }
      - working-directory: apps/mobile
        run: npm ci --no-fund --no-audit
      - working-directory: apps/mobile
        run: npm run validate

  database-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash scripts/test-postgres-migrations.sh

  terraform-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - run: terraform -chdir=infra/aws fmt -check
      - run: terraform -chdir=infra/aws init -backend=false
      - run: terraform -chdir=infra/aws validate

  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: git diff --check
