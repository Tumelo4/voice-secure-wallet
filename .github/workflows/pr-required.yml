name: Required pull request checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: git diff --check
      - run: test -z "$(git ls-files | grep -E '(^|/)(target|build|dist|coverage)/|\.env$|\.pem$|\.key$' || true)"

  java-unit:
    name: Java compile and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: ./mvnw --batch-mode --no-transfer-progress test -Djacoco.skip=true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: java-unit-results
          path: "**/target/surefire-reports/"

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.11", cache: pip }
      - working-directory: services/voice-service
        run: python -m pip install -e ".[test]"
      - working-directory: services/voice-service
        run: python -m pytest --junitxml=voice-test-results.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: python-test-results
          path: services/voice-service/voice-test-results.xml

  mobile-validation:
    name: Mobile type checking and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - working-directory: apps/mobile
        run: npm ci --no-fund --no-audit
      - working-directory: apps/mobile
        run: npm run validate

  architecture-tests:
    name: Architecture tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: ./mvnw --batch-mode --no-transfer-progress -pl quality/architecture-tests -am test -Djacoco.skip=true

  capability-registry:
    name: Capability registry consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.11" }
      - run: python scripts/generate-capability-status.py --check

  secret-scanning:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with: { fail-on-severity: high }

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: ./mvnw --batch-mode --no-transfer-progress -DskipTests install
      - run: >-
          ./mvnw --batch-mode --no-transfer-progress
          -pl build-support,services/event-core,services/identity-service,services/compliance-service,services/ledger-service,services/payment-service,services/notification-service,services/wallet-service,services/beneficiary-service,services/fraud-service,services/recovery-service,services/support-service,services/ops-service,services/launch-service,services/api-adapter-service,tests/contract-tests
          com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:check

  migration-validation:
    name: Migration validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash scripts/test-postgres-migrations.sh
