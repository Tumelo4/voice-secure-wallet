name: Security gates

# Temporarily manual-only while Phase 2 infrastructure work is in progress.
# Restore pull_request/push triggers before production release gating resumes.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript, python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with: { languages: "${{ matrix.language }}" }
      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - if: matrix.language == 'java-kotlin'
        run: mvn --batch-mode --no-transfer-progress -DskipTests package
      - uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3

  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.11", cache: pip }
      - run: python -m pip install bandit pip-audit ruff mypy -e "services/voice-service[test]"
      - run: ruff check services/voice-service
      - run: mypy services/voice-service/src
      - run: bandit -q -r services/voice-service/src
      - run: pip-audit

  java-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn --batch-mode --no-transfer-progress -DskipTests install
      - run: >-
          mvn --batch-mode --no-transfer-progress
          -pl build-support,services/event-core,services/identity-service,services/compliance-service,services/ledger-service,services/payment-service,services/notification-service,services/wallet-service,services/beneficiary-service,services/fraud-service,services/recovery-service,services/support-service,services/ops-service,services/launch-service,services/api-adapter-service,tests/contract-tests
          com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:check
      # PRs are gated by dependency-review above. The unauthenticated initial
      # NVD bootstrap exceeds GitHub's six-hour job limit, so run the full ODC
      # database scan after merge where it cannot deadlock every pull request.
      - if: github.event_name == 'push'
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.owasp:dependency-check-maven:12.1.0:check
          -DfailBuildOnCVSS=7
          -DossindexAnalyzerEnabled=false
          -DsuppressionFiles=dependency-check-suppressions.xml

  mobile-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "24", cache: npm, cache-dependency-path: apps/mobile/package-lock.json }
      - working-directory: apps/mobile
        run: npm ci --no-fund --no-audit
      - working-directory: apps/mobile
        run: npm audit --audit-level=high

  infrastructure-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: "3.11", cache: pip }
      - run: python -m pip install checkov
      - run: checkov -d infra/aws --framework terraform
