name: Container supply chain

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  container-build-scan-sbom:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: wallet-api
            context: .
            dockerfile: services/api-adapter-service/Dockerfile
          - component: voice-verification
            context: services/voice-service
            dockerfile: services/voice-service/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "${{ matrix.context }}"
          file: "${{ matrix.dockerfile }}"
          load: true
          push: false
          tags: "voicesecure/${{ matrix.component }}:ci"
          provenance: false
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: "voicesecure/${{ matrix.component }}:ci"
          format: sarif
          output: "${{ matrix.component }}-trivy.sarif"
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: "voicesecure/${{ matrix.component }}:ci"
          format: cyclonedx-json
          output-file: "${{ matrix.component }}.cdx.json"
          upload-artifact: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "${{ matrix.component }}-supply-chain-evidence"
          path: |
            ${{ matrix.component }}.cdx.json
            ${{ matrix.component }}-trivy.sarif

  publish-by-digest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - component: wallet-api
            context: .
            dockerfile: services/api-adapter-service/Dockerfile
          - component: voice-verification
            context: services/voice-service
            dockerfile: services/voice-service/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "${{ matrix.context }}"
          file: "${{ matrix.dockerfile }}"
          push: true
          tags: "${{ steps.image.outputs.name }}:${{ github.sha }}"
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: "${{ steps.image.outputs.name }}"
          subject-digest: "${{ steps.build.outputs.digest }}"
          push-to-registry: true
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - env:
          IMAGE: "${{ steps.image.outputs.name }}"
          DIGEST: "${{ steps.build.outputs.digest }}"
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
