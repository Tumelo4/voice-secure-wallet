<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #536174; }
    .box { fill: #eef4ff; stroke: #315b9d; stroke-width: 2; rx: 16; }
    .foundation { fill: #e8f8ee; stroke: #287a49; }
    .data { fill: #f3e8ff; stroke: #6b3fa0; }
    .msk { fill: #ffe9e9; stroke: #a33a3a; }
    .label { font-size: 19px; font-weight: 600; text-anchor: middle; }
    .small { font-size: 15px; fill: #536174; text-anchor: middle; }
    .line { stroke: #526777; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#526777"/></marker></defs>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="70" y="70" class="title">Temporary AWS demonstration architecture</text>
  <text x="70" y="105" class="subtitle">Private subnets · no NAT Gateway · workload-selected VPC endpoints · staged chargeable services</text>
  <rect x="55" y="145" width="1290" height="525" rx="24" fill="#fafcff" stroke="#8fa7bf" stroke-width="3"/>
  <text x="85" y="185" class="subtitle">VPC / af-south-1 — private route table, S3 gateway endpoint, VPC Flow Logs</text>

  <rect x="105" y="245" width="230" height="120" class="box"/>
  <text x="220" y="295" class="label">Private workloads</text><text x="220" y="325" class="small">Application security group</text>
  <rect x="440" y="215" width="250" height="115" class="box foundation"/>
  <text x="565" y="260" class="label">Stage 1 · Foundation</text><text x="565" y="290" class="small">KMS · S3 · CloudWatch</text>
  <rect x="440" y="385" width="250" height="115" class="box foundation"/>
  <text x="565" y="430" class="label">Interface endpoints</text><text x="565" y="460" class="small">Only services in use · HTTPS 443</text>
  <rect x="795" y="215" width="230" height="115" class="box data"/>
  <text x="910" y="260" class="label">Stage 2 · RDS</text><text x="910" y="290" class="small">Private PostgreSQL · TLS</text>
  <rect x="795" y="385" width="230" height="115" class="box data"/>
  <text x="910" y="430" class="label">Stage 2 · Redis</text><text x="910" y="460" class="small">TLS · idempotency</text>
  <rect x="1090" y="300" width="210" height="120" class="box msk"/>
  <text x="1195" y="348" class="label">Stage 3 · MSK</text><text x="1195" y="378" class="small">IAM/TLS · destroy last</text>

  <path d="M335 285 L440 270" class="line"/><path d="M335 325 L440 430" class="line"/>
  <path d="M690 270 L795 270" class="line"/><path d="M690 435 L795 435" class="line"/>
  <path d="M1025 270 L1090 330" class="line"/><path d="M1025 435 L1090 390" class="line"/>
  <text x="700" y="630" class="subtitle" text-anchor="middle">Each stage is applied, evidenced, and torn down before long-lived hourly costs accumulate.</text>
</svg>
